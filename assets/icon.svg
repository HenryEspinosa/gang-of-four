<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!--
    Gang of Four — app icon.
    Inspired by Susan James ("the Gang of Four") from Peter Watts' Blindsight:
    one body, four partitioned personalities. Here: four distinct minds
    (the council models) linked into a single synthesis core (one answer).
  -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="36%" r="78%">
      <stop offset="0%" stop-color="#16212c"/>
      <stop offset="100%" stop-color="#090d12"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="46%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#d4e3ff"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- four overlapping minds: teal, blue, violet, amber -->
  <g style="mix-blend-mode: screen">
    <circle cx="256" cy="190" r="132" fill="#2dd4bf" opacity="0.40"/>
    <circle cx="322" cy="256" r="132" fill="#3b82f6" opacity="0.42"/>
    <circle cx="256" cy="322" r="132" fill="#a78bfa" opacity="0.40"/>
    <circle cx="190" cy="256" r="132" fill="#fbbf24" opacity="0.34"/>
  </g>

  <!-- links from each mind-node to the shared core -->
  <g stroke="#aebfdd" stroke-width="5" opacity="0.55" stroke-linecap="round">
    <line x1="256" y1="150" x2="256" y2="256"/>
    <line x1="362" y1="256" x2="256" y2="256"/>
    <line x1="256" y1="362" x2="256" y2="256"/>
    <line x1="150" y1="256" x2="256" y2="256"/>
  </g>

  <!-- the four personalities -->
  <g stroke="#eaf2ff" stroke-width="3.5">
    <circle cx="256" cy="150" r="20" fill="#2dd4bf"/>
    <circle cx="362" cy="256" r="20" fill="#3b82f6"/>
    <circle cx="256" cy="362" r="20" fill="#a78bfa"/>
    <circle cx="150" cy="256" r="20" fill="#fbbf24"/>
  </g>

  <!-- synthesis core: one voice -->
  <circle cx="256" cy="256" r="52" fill="#3b82f6" opacity="0.45" filter="url(#soft)"/>
  <circle cx="256" cy="256" r="42" fill="url(#core)"/>
</svg>
