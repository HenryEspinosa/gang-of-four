name: Build apps

# Run manually (Actions tab -> "Build apps" -> Run workflow) to test a build,
# or automatically when a version tag like v0.1.0 is pushed, which also attaches
# the built apps to a GitHub Release.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create/update Releases on a tag

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: GangOfFour-Windows.exe
          - os: macos-latest # Apple Silicon (arm64) build; fast runners. Note: won't run on older Intel Macs.
            asset: GangOfFour-macOS.zip
          - os: ubuntu-latest
            asset: GangOfFour-Linux.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Tesseract OCR
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            sudo apt-get update -q && sudo apt-get install -y tesseract-ocr libxcb-cursor0
          elif [ "$RUNNER_OS" == "macOS" ]; then
            brew install tesseract
          elif [ "$RUNNER_OS" == "Windows" ]; then
            choco install tesseract --no-progress -y
            echo "C:\\Program Files\\Tesseract-OCR" >> "$GITHUB_PATH"
          fi

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm --clean gang-of-four.spec

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item dist/GangOfFour.exe ${{ matrix.asset }}

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --keepParent dist/GangOfFour.app ${{ matrix.asset }}

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          chmod +x dist/GangOfFour
          tar czf ${{ matrix.asset }} -C dist GangOfFour

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

      - name: Attach to Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
